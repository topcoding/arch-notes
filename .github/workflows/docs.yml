# .github/workflows/docs.yml
name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 1. 安装最新版 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 2. 运行官方最新发布的 docmd 编译器进行打包
      - name: Build with latest docmd
        run: npx @docmd/core build

      # 3. 上传构建产物
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'site' # 对应 docmd.config.json 中的 out: "site"

      # 4. 部署到 GitHub Pages
      - uses: actions/deploy-pages@v4
        id: deploy
