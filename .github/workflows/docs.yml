# .github/workflows/docs.yml
name: Deploy Docs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build with latest docmd
        run: npx @docmd/core build

      # 🚀 针对性修复：批量把 HTML 中 src="../assets/" 替换为 src="assets/"
      # 这样配合已经存在的 <base> 标签，浏览器就能完美拼出 /arch-notes/assets/...
      - name: Fix Asset Relative Paths
        run: |
          find site -name "*.html" -exec sed -i 's|src="../assets/|src="assets/|g' {} +
          echo "✅ Fixed image paths by removing '../'"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deploy
